services:
  mongodb:
    image: mongo:7
    container_name: portfolio-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: portfolioDB
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - portfolio-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/portfolioDB
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../Portfolio-Backend
      dockerfile: Dockerfile
    container_name: portfolio-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      NODE_ENV: production
      DATABASE: mongodb://mongodb:27017/portfolioDB
      DATABASE_PASSWORD: ""
      JWT_SECRET: ${JWT_SECRET:-thisismyportfolioandonlyIhavetheaccesstomakechangestoit}
      JWT_EXPIRES_IN: 90d
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - portfolio-network
    volumes:
      - ../Portfolio-Backend:/app
      - /app/node_modules

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    networks:
      - portfolio-network
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mongodb_data:
  mongodb_config:

networks:
  portfolio-network:
    driver: bridge
